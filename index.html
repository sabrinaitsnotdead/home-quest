<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Quest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e17;
  --surface: #1a1928;
  --surface2: #231f38;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #fffffe;
  --muted: rgba(255,255,255,0.45);
  --purple: #a78bfa;
  --purple-dim: #7c5cbf;
  --purple-bg: rgba(167,139,250,0.12);
  --purple-glow: rgba(167,139,250,0.25);
  --green: #34d399;
  --green-bg: rgba(52,211,153,0.1);
  --amber: #fbbf24;
  --amber-bg: rgba(251,191,36,0.1);
  --coral: #f87171;
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  padding: 0 0 6rem;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 80% 10%, rgba(124,92,191,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 10% 80%, rgba(52,211,153,0.08) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* HEADER */
.header {
  padding: 24px 20px 16px;
  position: relative;
  z-index: 1;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 20px;
  letter-spacing: -0.5px;
}
.logo span { color: var(--purple); }
.header-date {
  font-size: 12px;
  color: var(--muted);
  font-family: 'Syne', sans-serif;
  letter-spacing: 0.02em;
}
.header-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.level-pill {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 11px;
  background: var(--purple-bg);
  color: var(--purple);
  border: 1px solid rgba(167,139,250,0.3);
  border-radius: 999px;
}
.month-xp-pill {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 11px;
  background: var(--green-bg);
  color: var(--green);
  border: 1px solid rgba(52,211,153,0.25);
  border-radius: 999px;
}
.xp-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 7px;
}
.xp-label {
  font-size: 11px;
  color: var(--muted);
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.xp-val { font-size: 13px; font-weight: 500; color: var(--purple); }
.xp-track { height: 6px; background: var(--surface2); border-radius: 999px; overflow: hidden; }
.xp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--purple-dim), var(--purple));
  border-radius: 999px;
  transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
}
.xp-fill::after {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 8px;
  background: rgba(255,255,255,0.4);
  border-radius: 999px;
  filter: blur(2px);
}

/* STATS */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 0 20px;
  margin-bottom: 16px;
  position: relative;
  z-index: 1;
}
.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 10px;
  text-align: center;
}
.stat-n {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
  margin-bottom: 3px;
}
.stat-l { font-size: 10px; color: var(--muted); }

/* STREAK */
.streak {
  margin: 0 20px 20px;
  padding: 12px 16px;
  background: var(--amber-bg);
  border: 1px solid rgba(251,191,36,0.2);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  gap: 12px;
  position: relative;
  z-index: 1;
}
.streak-icon { font-size: 22px; }
.streak-text { font-size: 13px; color: var(--amber); line-height: 1.4; }
.streak-text b { font-weight: 600; }

/* SECTION HEAD */
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.section-head-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}
.section-head-label::before {
  content: '';
  width: 3px;
  height: 14px;
  background: var(--purple);
  border-radius: 2px;
}

/* ADD BUTTON */
.btn-add {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--purple-bg);
  border: 1px solid rgba(167,139,250,0.3);
  border-radius: 999px;
  color: var(--purple);
  font-size: 12px;
  font-weight: 600;
  font-family: 'Syne', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-add:hover { background: rgba(167,139,250,0.2); }

/* TABS */
.tabs-wrap { padding: 0 20px; margin-bottom: 16px; position: relative; z-index: 1; }
.tabs {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 2px;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0;
  padding: 6px 13px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  transition: all 0.15s;
  white-space: nowrap;
}
.tab:hover { border-color: var(--border2); color: var(--text); }
.tab.active {
  background: var(--purple-bg);
  border-color: rgba(167,139,250,0.4);
  color: var(--purple);
  font-weight: 600;
}

/* DAY CONTENT */
.day-wrap { padding: 0 20px; margin-bottom: 24px; position: relative; z-index: 1; }
.day-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.day-title-row { display: flex; align-items: center; gap: 10px; }
.day-emoji { font-size: 18px; }
.day-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }
.day-done-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 9px;
  background: var(--green-bg);
  color: var(--green);
  border-radius: 999px;
  border: 1px solid rgba(52,211,153,0.25);
}
.task-list { display: flex; flex-direction: column; gap: 7px; }
.task {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 11px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.task:hover { border-color: var(--border2); }
.task:active { transform: scale(0.98); }
.task.done { opacity: 0.4; }
.task-check {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
  font-size: 11px;
}
.task.done .task-check { background: var(--purple); border-color: var(--purple); color: white; }
.task-name { flex: 1; font-size: 14px; color: var(--text); transition: all 0.2s; }
.task.done .task-name { text-decoration: line-through; color: var(--muted); }
.task-right { display: flex; align-items: center; gap: 6px; }
.task-xp { font-size: 12px; font-weight: 600; color: var(--purple); font-family: 'Syne', sans-serif; }
.task-custom-badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 999px;
  background: rgba(251,191,36,0.12);
  color: var(--amber);
  border: 1px solid rgba(251,191,36,0.2);
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  white-space: nowrap;
}
.task-delete {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: rgba(248,113,113,0.1);
  border: 1px solid rgba(248,113,113,0.2);
  color: var(--coral);
  font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.15s;
}
.task-delete:hover { background: rgba(248,113,113,0.25); }

/* DAILY */
.daily-wrap { padding: 0 20px; margin-bottom: 24px; position: relative; z-index: 1; }
.daily-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.daily-task {
  display: flex; align-items: center; gap: 8px;
  padding: 11px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.daily-task:hover { border-color: var(--border2); }
.daily-task:active { transform: scale(0.98); }
.daily-task.done { opacity: 0.4; }
.daily-check { font-size: 16px; color: var(--border2); transition: color 0.2s; flex-shrink: 0; }
.daily-task.done .daily-check { color: var(--green); }
.daily-name { font-size: 13px; color: var(--text); flex: 1; line-height: 1.3; }
.daily-task.done .daily-name { text-decoration: line-through; color: var(--muted); }
.daily-xp { font-size: 11px; font-weight: 600; color: var(--green); font-family: 'Syne', sans-serif; }

/* BADGES */
.badges-wrap { padding: 0 20px; margin-bottom: 24px; position: relative; z-index: 1; }
.badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.badge {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 10px;
  text-align: center;
  transition: all 0.2s;
}
.badge.unlocked { border-color: rgba(167,139,250,0.3); background: var(--purple-bg); }
.badge.locked { filter: grayscale(1); opacity: 0.35; }
.badge-icon { font-size: 24px; margin-bottom: 5px; }
.badge-name { font-size: 11px; font-weight: 600; color: var(--text); font-family: 'Syne', sans-serif; margin-bottom: 2px; }
.badge-desc { font-size: 10px; color: var(--muted); line-height: 1.3; }

/* RESUMO MENSAL */
.resumo-wrap { padding: 0 20px; margin-bottom: 24px; position: relative; z-index: 1; }
.resumo-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 10px;
}
.resumo-month {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.resumo-grade {
  font-size: 22px;
  font-weight: 800;
  font-family: 'Syne', sans-serif;
}
.resumo-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.resumo-stat { text-align: center; }
.resumo-stat-n { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; color: var(--purple); }
.resumo-stat-l { font-size: 11px; color: var(--muted); margin-top: 2px; }
.resumo-bar-wrap { margin-top: 14px; }
.resumo-bar-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; display: flex; justify-content: space-between; }
.resumo-bar { height: 8px; background: var(--surface2); border-radius: 999px; overflow: hidden; margin-bottom: 8px; }
.resumo-bar-fill { height: 100%; border-radius: 999px; }
.resumo-empty { text-align: center; padding: 32px 0; color: var(--muted); font-size: 14px; }

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 32px;
  width: 100%;
  max-width: 480px;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-title {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-close {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--muted);
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.form-group { margin-bottom: 14px; }
.form-label { font-size: 11px; font-weight: 600; color: var(--muted); font-family: 'Syne', sans-serif; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; display: block; }
.form-input {
  width: 100%;
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.15s;
}
.form-input:focus { border-color: rgba(167,139,250,0.5); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-select {
  width: 100%;
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  appearance: none;
  cursor: pointer;
}
.btn-submit {
  width: 100%;
  padding: 13px;
  background: var(--purple);
  border: none;
  border-radius: var(--radius);
  color: white;
  font-size: 15px;
  font-weight: 600;
  font-family: 'Syne', sans-serif;
  cursor: pointer;
  margin-top: 6px;
  transition: opacity 0.15s;
}
.btn-submit:hover { opacity: 0.85; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 88px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  border: 1px solid var(--purple-glow);
  color: var(--purple);
  padding: 9px 20px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 600;
  font-family: 'Syne', sans-serif;
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
  box-shadow: 0 4px 24px var(--purple-glow);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: rgba(15,14,23,0.92);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 10px 20px 18px;
  gap: 4px;
  z-index: 100;
}
.nav-btn {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 7px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--muted);
  transition: all 0.15s;
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-family: 'Syne', sans-serif;
  -webkit-tap-highlight-color: transparent;
}
.nav-btn:hover { color: var(--text); }
.nav-btn.active { color: var(--purple); }
.nav-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

.view { display: none; }
.view.active { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">🏡 Home<span>Quest</span></div>
    <div class="header-date" id="header-date"></div>
  </div>
  <div class="header-meta">
    <div class="level-pill" id="level-pill">Nível 1 — Aprendiz</div>
    <div class="month-xp-pill" id="month-xp-pill">Mês: 0 XP</div>
  </div>
  <div class="xp-row">
    <span class="xp-label">Progresso</span>
    <span class="xp-val" id="xp-display">0 / 100 XP</span>
  </div>
  <div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
</div>

<!-- MISSÕES -->
<div class="view active" id="view-missoes">
  <div class="stats">
    <div class="stat"><div class="stat-n" id="stat-total">0</div><div class="stat-l">feitas</div></div>
    <div class="stat"><div class="stat-n" id="stat-xp">0</div><div class="stat-l">XP total</div></div>
    <div class="stat"><div class="stat-n" id="stat-streak">0🔥</div><div class="stat-l">sequência</div></div>
  </div>
  <div class="streak">
    <div class="streak-icon">🔥</div>
    <div class="streak-text" id="streak-text">Complete os hábitos de hoje para começar sua sequência!</div>
  </div>
  <div class="tabs-wrap">
    <div class="section-head">
      <div class="section-head-label">Semana</div>
      <button class="btn-add" onclick="openModal('weekly')">+ Nova tarefa</button>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>
  <div class="day-wrap" id="day-content"></div>
</div>

<!-- HÁBITOS -->
<div class="view" id="view-habitos">
  <div class="daily-wrap" style="padding-top:8px">
    <div class="section-head">
      <div class="section-head-label">Hábitos diários</div>
      <button class="btn-add" onclick="openModal('daily')">+ Novo</button>
    </div>
    <div class="daily-grid" id="daily-grid"></div>
  </div>
</div>

<!-- CONQUISTAS -->
<div class="view" id="view-conquistas">
  <div class="badges-wrap" style="padding-top:8px">
    <div class="section-head"><div class="section-head-label">Conquistas</div></div>
    <div class="badge-grid" id="badge-grid"></div>
  </div>
</div>

<!-- RESUMO -->
<div class="view" id="view-resumo">
  <div class="resumo-wrap" style="padding-top:8px">
    <div class="section-head"><div class="section-head-label">Resumo mensal</div></div>
    <div id="resumo-content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">
      <span id="modal-title-text">Nova tarefa</span>
      <div class="modal-close" onclick="closeModal()">✕</div>
    </div>
    <div class="form-group">
      <label class="form-label">Nome da tarefa</label>
      <input class="form-input" id="f-name" type="text" placeholder="Ex: Limpar geladeira por dentro">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Pontos (XP)</label>
        <input class="form-input" id="f-xp" type="number" min="1" max="50" value="10">
      </div>
      <div class="form-group" id="f-freq-wrap">
        <label class="form-label">Periodicidade</label>
        <select class="form-select" id="f-freq" onchange="onFreqChange()">
          <option value="weekly">Toda semana</option>
          <option value="biweekly">A cada 15 dias</option>
          <option value="monthly">Uma vez por mês</option>
          <option value="daily">Todo dia</option>
        </select>
      </div>
    </div>
    <div class="form-group" id="f-day-wrap">
      <label class="form-label">Dia da semana</label>
      <select class="form-select" id="f-day">
        <option value="seg">Segunda</option>
        <option value="ter">Terça</option>
        <option value="qua">Quarta</option>
        <option value="qui">Quinta</option>
        <option value="sex">Sexta</option>
        <option value="sab">Sábado</option>
        <option value="dom">Domingo</option>
      </select>
    </div>
    <div class="form-group" id="f-biweekly-wrap" style="display:none">
      <label class="form-label">Semana de início</label>
      <select class="form-select" id="f-biweekly-start">
        <option value="1">Semanas ímpares (1ª, 3ª...)</option>
        <option value="2">Semanas pares (2ª, 4ª...)</option>
      </select>
    </div>
    <button class="btn-submit" onclick="submitTask()">Adicionar tarefa</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav class="bottom-nav">
  <div class="nav-btn active" id="nav-missoes" onclick="switchView('missoes')">
    <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>

  <div class="nav-btn" id="nav-habitos" onclick="switchView('habitos')">
    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>

  <div class="nav-btn" id="nav-conquistas" onclick="switchView('conquistas')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>

    Resumo
  </div>
</nav>

<script>
// ── BASE TASKS ──────────────────────────────────────────────────────────────
const BASE_DAYS = [
  { id:'seg', label:'Seg', emoji:'🧹', name:'Segunda', tasks:[
    {name:'Limpar bancadas da cozinha', xp:10},
    {name:'Limpar fogão após o uso', xp:10},
    {name:'Trocar pano de prato', xp:5},
    {name:'Descer o lixo', xp:7},
    {name:'Dobrar e guardar roupas', xp:10},
    {name:'Lavar roupa de cama + roupa Sky', xp:12},
  ]},
  { id:'ter', label:'Ter', emoji:'🚿', name:'Terça', tasks:[
    {name:'Limpar pias e torneiras', xp:10},
    {name:'Limpar espelhos', xp:8},
    {name:'Trocar toalhas', xp:5},
    {name:'Lavar toalhas', xp:10},
    {name:'Lavar prato de água da Sky', xp:6},
  ]},
  { id:'qua', label:'Qua', emoji:'📦', name:'Quarta', tasks:[
    {name:'Guardar objetos fora do lugar', xp:8},
    {name:'Organizar mesa de jantar', xp:8},
    {name:'Organizar escritório', xp:10},
    {name:'Esvaziar lixeiras menores', xp:5},
    {name:'Descer o lixo', xp:7},
  ]},
  { id:'qui', label:'Qui', emoji:'👕', name:'Quinta', tasks:[
    {name:'Recolher roupas secas', xp:8},
    {name:'Recolher toalhas do varal', xp:7},
  ]},
  { id:'sex', label:'Sex', emoji:'✨', name:'Sexta', tasks:[
    {name:'Limpar vaso sanitário', xp:12},
    {name:'Limpar pia e torneira', xp:10},
    {name:'Limpar espelho e box', xp:10},
    {name:'Limpar gabinete do banheiro', xp:8},
    {name:'Limpar fogão e micro-ondas', xp:12},
    {name:'Limpar bancadas e mesa', xp:10},
    {name:'Limpar geladeira por fora', xp:8},
    {name:'Tirar pó da sala', xp:8},
    {name:'Aspirar/varrer e passar pano', xp:15},
    {name:'Trocar roupa de cama', xp:12},
    {name:'Limpar quarto e escritório', xp:10},
  ]},
  { id:'sab', label:'Sáb', emoji:'🫧', name:'Sábado', tasks:[
    {name:'Separar e lavar roupas', xp:12},
    {name:'Estender roupas', xp:8},
    {name:'Limpar filtro da máquina', xp:10},
    {name:'Organizar lavanderia', xp:8},
    {name:'Regar plantas', xp:6},
    {name:'Lavar prato de água da Sky', xp:6},
  ]},
  { id:'dom', label:'Dom', emoji:'☀️', name:'Domingo', tasks:[
    {name:'Descansar (XP grátis! 🎁)', xp:20},
  ]},
];

const BASE_DAILY = [
  {name:'Fazer a cama', xp:8},
  {name:'Lavar a louça', xp:8},
  {name:'Limpar bancada', xp:5},
  {name:'Guardar objetos', xp:5},
];

const LEVELS = [
  {min:0, max:100, name:'Aprendiz'},
  {min:100, max:250, name:'Escudeiro'},
  {min:250, max:500, name:'Guarda da Casa'},
  {min:500, max:900, name:'Mestre Doméstico'},
  {min:900, max:1500, name:'Herói do Lar'},
  {min:1500, max:99999, name:'Lenda da Limpeza'},
];

const BADGES = [
  {id:'first', icon:'⭐', name:'1ª missão', desc:'Complete 1 tarefa', req:s=>s.total>=1},
  {id:'streak3', icon:'🔥', name:'3 dias seguidos', desc:'Streak de 3 dias', req:s=>s.streak>=3},
  {id:'xp100', icon:'⚡', name:'Centenária', desc:'Acumule 100 XP', req:s=>s.xp>=100},
  {id:'week', icon:'📅', name:'Semana completa', desc:'Complete 7 dias', req:s=>s.daysCompleted>=7},
  {id:'daily7', icon:'🔄', name:'Rotina sagrada', desc:'7x hábitos completos', req:s=>s.dailyCompletes>=7},
  {id:'xp500', icon:'👑', name:'Realeza', desc:'Acumule 500 XP', req:s=>s.xp>=500},
];

const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS_PT = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];

// ── STATE ────────────────────────────────────────────────────────────────────
function defaultState() {
  return {
    xp: 0, total: 0, streak: 0, daysCompleted: 0, dailyCompletes: 0,
    checked: {}, dailyChecked: [], lastDaily: null,
    customTasks: [],   // {id, name, xp, freq, dayId, biweeklyStart}
    monthlyHistory: [], // {month:'2025-06', xp:120, total:30, streak:5}
    monthXp: 0,
    currentMonth: currentMonthKey(),
  };
}

function currentMonthKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}

let state = (() => {
  try { return JSON.parse(localStorage.getItem('hq3_state')) || null; } catch(e) { return null; }
})() || defaultState();

// Migrate old state keys if needed
if (!state.customTasks) state.customTasks = [];
if (!state.monthlyHistory) state.monthlyHistory = [];
if (!state.monthXp) state.monthXp = 0;
if (!state.currentMonth) state.currentMonth = currentMonthKey();

// Month rollover check
function checkMonthRollover() {
  const mk = currentMonthKey();
  if (state.currentMonth !== mk) {
    // Save last month summary
    state.monthlyHistory.push({
      month: state.currentMonth,
      xp: state.monthXp,
      total: state.total,
      streak: state.streak,
    });
    // Reset monthly counters
    state.monthXp = 0;
    state.currentMonth = mk;
    state.checked = {};
    state.total = 0;
    save();
  }
}

function save() {
  try { localStorage.setItem('hq3_state', JSON.stringify(state)); } catch(e) {}
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
const todayIdx = () => { const d = new Date().getDay(); return d === 0 ? 6 : d - 1; };
let activeDay = BASE_DAYS[todayIdx()].id;
let currentView = 'missoes';
let modalMode = 'weekly';

// Get current week number of year
function weekNumber() {
  const d = new Date();
  const start = new Date(d.getFullYear(), 0, 1);
  return Math.ceil(((d - start) / 86400000 + start.getDay() + 1) / 7);
}

// Build DAYS array merging base + custom weekly/biweekly/monthly tasks
function buildDays() {
  const today = new Date();
  const wk = weekNumber();
  const dayOfMonth = today.getDate();

  return BASE_DAYS.map(day => {
    const extra = state.customTasks.filter(t => {
      if (t.freq === 'weekly') return t.dayId === day.id;
      if (t.freq === 'biweekly') {
        const isOdd = wk % 2 === 1;
        return t.dayId === day.id && ((t.biweeklyStart === 1 && isOdd) || (t.biweeklyStart === 2 && !isOdd));
      }
      if (t.freq === 'monthly') {
        // Show on the first occurrence of that weekday this month
        return t.dayId === day.id && dayOfMonth <= 7;
      }
      return false;
    });
    return {
      ...day,
      tasks: [
        ...day.tasks,
        ...extra.map(t => ({name: t.name, xp: t.xp, customId: t.id, freq: t.freq}))
      ]
    };
  });
}

function buildDailyList() {
  const dailyCustom = state.customTasks.filter(t => t.freq === 'daily');
  return [...BASE_DAILY, ...dailyCustom.map(t => ({name: t.name, xp: t.xp, customId: t.id}))];
}

function getLevel() {
  let lv = 0;
  LEVELS.forEach((l,i) => { if(state.xp >= l.min) lv = i; });
  return { index: lv+1, ...LEVELS[lv] };
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2000);
}

function freqLabel(freq) {
  if (freq === 'biweekly') return '15d';
  if (freq === 'monthly') return '1x/mês';
  return null;
}

// ── RENDER HEADER ─────────────────────────────────────────────────────────────
function updateHeader() {
  const lv = getLevel();
  document.getElementById('level-pill').textContent = 'Nível ' + lv.index + ' — ' + lv.name;
  document.getElementById('month-xp-pill').textContent = 'Mês: ' + state.monthXp + ' XP';
  const pct = Math.min(100, Math.round(((state.xp - lv.min) / (lv.max - lv.min)) * 100));
  document.getElementById('xp-fill').style.width = pct + '%';
  document.getElementById('xp-display').textContent = state.xp + ' / ' + lv.max + ' XP';
  document.getElementById('stat-total').textContent = state.total;
  document.getElementById('stat-xp').textContent = state.xp;
  document.getElementById('stat-streak').textContent = state.streak + '🔥';
  const st = document.getElementById('streak-text');
  if (state.streak === 0) {
    st.innerHTML = 'Complete os hábitos de hoje para começar sua sequência!';
  } else {
    st.innerHTML = '<b>' + state.streak + ' dias seguidos!</b> Não quebre a corrente 💪';
  }
  // Date
  const now = new Date();
  document.getElementById('header-date').textContent =
    DAYS_PT[now.getDay()] + ', ' + now.getDate() + ' de ' + MONTHS_PT[now.getMonth()];
}

// ── RENDER TABS ───────────────────────────────────────────────────────────────
function renderTabs() {
  const c = document.getElementById('tabs');
  c.innerHTML = '';
  BASE_DAYS.forEach(d => {
    const t = document.createElement('div');
    t.className = 'tab' + (d.id === activeDay ? ' active' : '');
    t.textContent = d.label;
    t.onclick = () => { activeDay = d.id; renderTabs(); renderDay(); };
    c.appendChild(t);
  });
}

// ── RENDER DAY ────────────────────────────────────────────────────────────────
function renderDay() {
  const DAYS = buildDays();
  const day = DAYS.find(d => d.id === activeDay);
  const checked = state.checked[day.id] || [];
  const totalForDay = day.tasks.length;
  const allDone = checked.length === totalForDay;
  const c = document.getElementById('day-content');
  c.innerHTML = '';

  const head = document.createElement('div');
  head.className = 'day-head';
  head.innerHTML = `
    <div class="day-title-row">
      <span class="day-emoji">${day.emoji}</span>
      <span class="day-name">${day.name}</span>
    </div>
    ${allDone ? '<span class="day-done-badge">✓ Completo</span>' : ''}
  `;
  c.appendChild(head);

  const list = document.createElement('div');
  list.className = 'task-list';
  day.tasks.forEach((task, i) => {
    const done = checked.includes(i);
    const fl = task.freq ? freqLabel(task.freq) : null;
    const el = document.createElement('div');
    el.className = 'task' + (done ? ' done' : '');
    el.innerHTML = `
      <div class="task-check">${done ? '✓' : ''}</div>
      <span class="task-name">${task.name}</span>
      <div class="task-right">
        ${fl ? `<span class="task-custom-badge">${fl}</span>` : ''}
        <span class="task-xp">+${task.xp}</span>
        ${task.customId ? `<div class="task-delete" onclick="deleteCustomTask(event,'${task.customId}')">✕</div>` : ''}
      </div>
    `;
    el.onclick = (e) => {
      if (e.target.classList.contains('task-delete')) return;
      toggleTask(day.id, i, task.xp, day);
    };
    list.appendChild(el);
  });
  c.appendChild(list);
}

function toggleTask(dayId, taskIdx, xp, day) {
  if (!state.checked[dayId]) state.checked[dayId] = [];
  const idx = state.checked[dayId].indexOf(taskIdx);
  if (idx === -1) {
    state.checked[dayId].push(taskIdx);
    state.xp += xp;
    state.monthXp += xp;
    state.total += 1;
    toast('+' + xp + ' XP ⚡');
    if (state.checked[dayId].length === day.tasks.length) {
      state.daysCompleted = Object.keys(state.checked).filter(k => {
        const d = buildDays().find(dd => dd.id === k);
        return d && state.checked[k].length === d.tasks.length;
      }).length;
      state.xp += 20;
      state.monthXp += 20;
      setTimeout(() => toast('🎉 Dia completo! +20 XP bônus!'), 500);
    }
  } else {
    state.checked[dayId].splice(idx, 1);
    state.xp = Math.max(0, state.xp - xp);
    state.monthXp = Math.max(0, state.monthXp - xp);
    state.total = Math.max(0, state.total - 1);
  }
  save(); updateHeader(); renderDay(); renderBadges();
}

// ── RENDER DAILY ──────────────────────────────────────────────────────────────
function renderDaily() {
  const today = new Date().toDateString();
  if (state.lastDaily !== today) { state.dailyChecked = []; state.lastDaily = today; save(); }
  const DAILY = buildDailyList();
  const grid = document.getElementById('daily-grid');
  grid.innerHTML = '';
  DAILY.forEach((task, i) => {
    const done = state.dailyChecked.includes(i);
    const el = document.createElement('div');
    el.className = 'daily-task' + (done ? ' done' : '');
    el.innerHTML = `
      <span class="daily-check">${done ? '✅' : '⬜'}</span>
      <span class="daily-name">${task.name}</span>
      ${task.customId ? `<div class="task-delete" style="margin-left:auto" onclick="deleteCustomTask(event,'${task.customId}')">✕</div>` : `<span class="daily-xp">+${task.xp}</span>`}
    `;
    el.onclick = (e) => {
      if (e.target.classList.contains('task-delete')) return;
      const idx = state.dailyChecked.indexOf(i);
      if (idx === -1) {
        state.dailyChecked.push(i);
        state.xp += task.xp;
        state.monthXp += task.xp;
        state.total += 1;
        toast('+' + task.xp + ' XP ⚡');
        if (state.dailyChecked.length === DAILY.length) {
          state.streak += 1;
          state.dailyCompletes += 1;
          setTimeout(() => toast('🔥 Streak ' + state.streak + '! Hábitos completos!'), 500);
        }
      } else {
        state.dailyChecked.splice(idx, 1);
        state.xp = Math.max(0, state.xp - task.xp);
        state.monthXp = Math.max(0, state.monthXp - task.xp);
        state.total = Math.max(0, state.total - 1);
      }
      save(); updateHeader(); renderDaily(); renderBadges();
    };
    grid.appendChild(el);
  });
}

// ── RENDER BADGES ─────────────────────────────────────────────────────────────
function renderBadges() {
  const grid = document.getElementById('badge-grid');
  grid.innerHTML = '';
  BADGES.forEach(b => {
    const unlocked = b.req(state);
    const el = document.createElement('div');
    el.className = 'badge' + (unlocked ? ' unlocked' : ' locked');
    el.innerHTML = `<div class="badge-icon">${b.icon}</div><div class="badge-name">${b.name}</div><div class="badge-desc">${b.desc}</div>`;
    grid.appendChild(el);
  });
}

// ── RENDER RESUMO ─────────────────────────────────────────────────────────────
function renderResumo() {
  const c = document.getElementById('resumo-content');
  c.innerHTML = '';

  // Current month card
  const now = new Date();
  const curCard = document.createElement('div');
  curCard.className = 'resumo-card';

  // Estimate total possible XP this month (rough)
  const maxMonthXp = 1200;
  const pct = Math.min(100, Math.round((state.monthXp / maxMonthXp) * 100));
  let grade = '🌱';
  if (pct >= 80) grade = '🏆';
  else if (pct >= 60) grade = '⭐';
  else if (pct >= 40) grade = '👍';
  else if (pct >= 20) grade = '💪';

  curCard.innerHTML = `
    <div class="resumo-month">
      <span>${MONTHS_PT[now.getMonth()]} ${now.getFullYear()}</span>
      <span class="resumo-grade">${grade}</span>
    </div>
    <div class="resumo-stats">
      <div class="resumo-stat">
        <div class="resumo-stat-n">${state.monthXp}</div>
        <div class="resumo-stat-l">XP no mês</div>
      </div>
      <div class="resumo-stat">
        <div class="resumo-stat-n">${state.streak}🔥</div>
        <div class="resumo-stat-l">streak atual</div>
      </div>
    </div>
    <div class="resumo-bar-wrap">
      <div class="resumo-bar-label">
        <span>Progresso do mês</span>
        <span>${pct}%</span>
      </div>
      <div class="resumo-bar">
        <div class="resumo-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--purple-dim),var(--purple))"></div>
      </div>
    </div>
  `;
  c.appendChild(curCard);

  // History
  if (state.monthlyHistory.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'resumo-empty';
    empty.textContent = 'O resumo dos meses anteriores vai aparecer aqui 📊';
    c.appendChild(empty);
    return;
  }

  const histLabel = document.createElement('div');
  histLabel.className = 'section-head';
  histLabel.innerHTML = '<div class="section-head-label">Meses anteriores</div>';
  c.appendChild(histLabel);

  [...state.monthlyHistory].reverse().forEach(h => {
    const [yr, mo] = h.month.split('-');
    const monthName = MONTHS_PT[parseInt(mo)-1] + ' ' + yr;
    const hp = Math.min(100, Math.round((h.xp / maxMonthXp) * 100));
    let hg = '🌱';
    if (hp >= 80) hg = '🏆';
    else if (hp >= 60) hg = '⭐';
    else if (hp >= 40) hg = '👍';
    else if (hp >= 20) hg = '💪';

    const card = document.createElement('div');
    card.className = 'resumo-card';
    card.innerHTML = `
      <div class="resumo-month">
        <span>${monthName}</span>
        <span class="resumo-grade">${hg}</span>
      </div>
      <div class="resumo-stats">
        <div class="resumo-stat">
          <div class="resumo-stat-n">${h.xp}</div>
          <div class="resumo-stat-l">XP no mês</div>
        </div>
        <div class="resumo-stat">
          <div class="resumo-stat-n">${h.streak}🔥</div>
          <div class="resumo-stat-l">streak máx.</div>
        </div>
      </div>
      <div class="resumo-bar-wrap">
        <div class="resumo-bar-label"><span>Desempenho</span><span>${hp}%</span></div>
        <div class="resumo-bar">
          <div class="resumo-bar-fill" style="width:${hp}%;background:linear-gradient(90deg,var(--purple-dim),var(--purple))"></div>
        </div>
      </div>
    `;
    c.appendChild(card);
  });
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(mode) {
  modalMode = mode;
  const overlay = document.getElementById('modal-overlay');
  const freqWrap = document.getElementById('f-freq-wrap');
  const dayWrap = document.getElementById('f-day-wrap');
  const biweeklyWrap = document.getElementById('f-biweekly-wrap');
  const title = document.getElementById('modal-title-text');
  const freqSel = document.getElementById('f-freq');

  if (mode === 'daily') {
    title.textContent = 'Novo hábito diário';
    freqWrap.style.display = 'none';
    dayWrap.style.display = 'none';
    biweeklyWrap.style.display = 'none';
  } else {
    title.textContent = 'Nova tarefa semanal';
    freqWrap.style.display = '';
    dayWrap.style.display = '';
    freqSel.value = 'weekly';
    biweeklyWrap.style.display = 'none';
    // Pre-select current active day
    document.getElementById('f-day').value = activeDay;
  }

  document.getElementById('f-name').value = '';
  document.getElementById('f-xp').value = '10';
  overlay.classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 350);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function onFreqChange() {
  const freq = document.getElementById('f-freq').value;
  const dayWrap = document.getElementById('f-day-wrap');
  const biweeklyWrap = document.getElementById('f-biweekly-wrap');
  dayWrap.style.display = freq === 'daily' ? 'none' : '';
  biweeklyWrap.style.display = freq === 'biweekly' ? '' : 'none';
}

function submitTask() {
  const name = document.getElementById('f-name').value.trim();
  const xp = parseInt(document.getElementById('f-xp').value) || 10;
  const freq = modalMode === 'daily' ? 'daily' : document.getElementById('f-freq').value;
  const dayId = document.getElementById('f-day').value;
  const biweeklyStart = parseInt(document.getElementById('f-biweekly-start').value);

  if (!name) { document.getElementById('f-name').focus(); return; }

  const id = 'c' + Date.now();
  state.customTasks.push({ id, name, xp, freq, dayId, biweeklyStart });
  save();
  closeModal();
  toast('Tarefa adicionada! ✨');

  if (freq === 'daily') { renderDaily(); }
  else { renderDay(); }
}

function deleteCustomTask(e, id) {
  e.stopPropagation();
  state.customTasks = state.customTasks.filter(t => t.id !== id);
  save();
  renderDay();
  renderDaily();
  toast('Tarefa removida');
}

// ── SWITCH VIEW ───────────────────────────────────────────────────────────────
function switchView(v) {
  currentView = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.getElementById('nav-' + v).classList.add('active');
  if (v === 'habitos') renderDaily();
  if (v === 'conquistas') renderBadges();
  if (v === 'resumo') renderResumo();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
checkMonthRollover();
renderTabs();
renderDay();
renderDaily();
renderBadges();
updateHeader();
</script>
</body>
</html>
